spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/handk_stock?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo}
spring.datasource.username=${DB_USERNAME:handk}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5s
spring.data.redis.connect-timeout=5s
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms
# MyBatis-Plus SQL日志输出
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
handk.request-form.template-path=${REQUEST_FORM_TEMPLATE_PATH:./stock-backend/src/main/resources/template/request_form_template_A.xlsx}
app.error.include-detail=true
